# Налаштування пайплайна review scoring

# Провайдер: anthropic (ANTHROPIC_API_KEY) або openrouter (OPENROUTER_API_KEY)
provider: openrouter

# Модель.
#   для anthropic:  claude-opus-4-8, claude-sonnet-5, claude-haiku-4-5 ...
#   для openrouter: слаги виду anthropic/claude-sonnet-4.5 —
#                   актуальний список: https://openrouter.ai/models?q=claude
model: anthropic/claude-sonnet-5
#model: openai/gpt-oss-120b:free

# Окрема (дешевша) модель для екстракції фраз (крок 2 — витягти дослівні
# цитати й розкласти по категоріях за жорсткими правилами промпту).
# Це набагато простіше завдання за групування, тож не потребує топової
# моделі. Порожньо/відсутнє = використовується та сама модель, що й для
# групування (`model` вище). Якість екстракції калібратором не перевіряється
# (calibrate.py тестує лише групування) — після зміни варто вибірково
# звірити phrases.json / verbatim_warnings.json на одному продукті.
extract_model: anthropic/claude-haiku-4.5

# Глибина міркувань (extended thinking): low | medium | high.
# Діє для обох провайдерів; якщо модель на OpenRouter не підтримує
# reasoning — параметр автоматично відкидається.
effort: medium
# Окремий (нижчий) effort для екстракції — просте слідування правилам,
# а не нюансоване судження, тож глибокі міркування там менш потрібні.
# Порожньо/відсутнє = той самий effort, що й `effort` вище.
extract_effort: low

# Окремий (нижчий) effort для фінального перепризначення (reassign): фрази
# розкладаються у ВЖЕ ГОТОВУ таксономію без створення нових груп — це задача
# зіставлення, простіша за побудову таксономії з нуля, тож глибокі міркування
# там дають мало, а токенів виходу (найдорожчих) — багато. Порожньо/відсутнє =
# той самий effort, що й `effort` вище. Після зниження варто прогнати
# calibrate.py, щоб переконатись у відсутності регресії якості.
reassign_effort: low

# Окремий (нижчий) effort для контрольної перевірки нових груп (double_check):
# вузьке лексичне рішення «чи нова група дублює наявну тему» — не потребує
# глибоких міркувань. Порожньо/відсутнє = той самий effort, що й `effort`.
verify_effort: low

# За замовчуванням аналізується ВЕСЬ PDF. Ліміти опціональні:
# max_reviews: 100     # взяти лише N найновіших відгуків на продукт
# cutoff: 2025-04-01   # аналізувати лише відгуки після цієї дати

# Розмір батчів для LLM-викликів
extract_batch: 8     # відгуків на один виклик екстракції
group_batch: 25      # фраз на один виклик групування

# Скільки LLM-викликів виконувати ОДНОЧАСНО (asyncio). Спільний ліміт на всі
# кроки пайплайна: екстракція та фінальні паси йдуть повністю паралельно,
# групування — паралельно між категоріями (батчі всередині категорії
# послідовні, бо кожен бачить таксономію після попереднього). Результат
# детермінований незалежно від цього значення. 1 = стара послідовна
# поведінка; при частих 429 від провайдера — зменшіть.
max_concurrent_requests: 10

# Контроль якості групування
double_check: true   # контрольна перевірка нових груп після кожного батча
                     # (чи нова група не дублює існуючу тему)
consolidate: true    # завершальний пас: злиття груп-дублікатів і перенесення
                     # фраз у правильні групи по всій таксономії
reassign: true       # фінальний пас: усі фрази ще раз розкладаються проти
                     # ГОТОВОЇ таксономії (без нових груп) — прибирає
                     # залежність результату від порядку батчів.
                     # Вимкнути: reassign: false або --no-reassign
row_merge: true      # LLM-пас злиття рядків-синонімів усередині груп
                     # ("They just don't stick" == "Didn't stick very well"
                     # == "Would not hold on skin"). Пропозиції судді все
                     # одно проходять жорстке вето (негація/кваліфікатори/
                     # рівні похвали). Вимкнути: row_merge: false або
                     # --no-row-merge. Лише цей пас на наявній таксономії:
                     # python run.py <папка> --rows-only

# Доменну синонімію ("don't stick" == "won't hold") за замовчуванням вирішує
# LLM-суддя — це працює для будь-якої категорії товарів без налаштувань.
# Якщо для конкретної товарної лінійки хочеться, щоб певна сім'я слів
# зливалась ДЕТЕРМІНОВАНО (без судді, стабільно між прогонами), її можна
# оголосити тут. Діє лише між двома ЗАПЕРЕЧНИМИ фразами. Слова у базовій
# формі (регулярні закінчення відкидаються самі; неправильні форми на
# кшталт stuck/held треба вказати окремо).
# synonym_families:
#   - [stick, sticky, stickiness, stuck, adhere, adhesion, adhesive, hold, held, stay]

# Окрема (сильніша) модель/effort для консолідації — це лише кілька
# викликів на прогін по всій таксономії, тож майже нічого не коштує.
# Порожньо/відсутнє = model / effort вище.
# consolidate_model: anthropic/claude-opus-4.8
consolidate_effort: high

# Зворотний зв'язок для гейта злиття: вердикти ✓/✗ з вкладки «Перевірити»
# (gate_labels.json) діють на наступних прогонах трьома шарами:
#  1) точний прецедент — та сама пара фраз вирішується вашим вердиктом;
#  2) схожий прецедент — пара, лексично дуже близька до розміченої, з тим
#     самим порушеним правилом, успадковує вердикт;
#  3) ваги правил — правило, чиї вето часто позначаються хибними, стає
#     «м'яким»: злиття судді проходить, а місце пишеться у чергу перевірки
#     (секція «Зняті вето») для контролю.
# Усі ТРИ шари СПІЛЬНІ для всіх товарів: під час прогону мітки збираються з
# УСІХ gate_labels.json у спільний пул, тож ваш вердикт на одному товарі
# вирішує ту саму (шар 1) чи лексично дуже близьку (шар 2) пару на будь-якому
# іншому, а ваги правил (шар 3) сумуються по всіх товарах. Запобіжники від
# хибного перенесення лишаються: збіг категорії + висока лексична схожість
# (для шару 2 — з ОБОХ боків), тож несхожі формулювання чужого товару просто
# не збігаються. Ваги правил додатково зберігаються у людиночитний файл
# products/gate_rule_weights.json (у корені папки products), який
# перебудовується при кожному прогоні й при збереженні мітки в GUI — видалити
# його безпечно (це звіт, а не джерело істини).
gate_feedback:
  min_labels: 3        # мінімум міток на одне правило, щоб ваги діяли
  soft_threshold: 0.7  # частка хибних вето (✗), після якої правило м'якшає
  near_precedent: 0.75 # лексична схожість до розміченої пари для прецеденту
